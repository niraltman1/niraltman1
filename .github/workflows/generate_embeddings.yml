name: Generate Supreme Court Embeddings MVP

on:
  workflow_dispatch: # מאפשר הפעלה ידנית בלחיצת כפתור

jobs:
  build-dataset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas datasets sentence-transformers torch

      - name: Run Data Pipeline
        run: |
          ls -la
          python generate_sc_mvp_embeddings.py

      - name: Upload JSONL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: factum-il-sc-dataset
          path: factum_il_mvp.jsonl
          retention-days: 7
