name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    name: Typecheck + Test + Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.4.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test (logic — all unit tests)
        id: test-logic
        run: pnpm test:logic

      - name: Test (env — integration / route tests)
        id: test-env
        run: pnpm test:env

      - name: Test (chaos — resilience scenarios)
        id: test-chaos
        run: pnpm test:chaos

  evals:
    name: Eval Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.4.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eval regression
        run: pnpm --filter @factum-il/evals eval
