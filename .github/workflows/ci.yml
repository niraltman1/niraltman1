name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    name: Typecheck + Test + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legal-os

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: legal-os/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

  evals:
    name: Eval Regression
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legal-os
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: legal-os/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eval regression
        run: pnpm --filter @factum-il/evals eval
