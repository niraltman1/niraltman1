name: Build Beta Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Beta version tag (e.g. 1.0-beta.2)'
        required: false
        default: '1.0-beta.1'
  push:
    tags:
      - 'v*-beta*'

jobs:
  build:
    name: Build Windows EXE Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.4.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build & stage (publish.ps1)
        run: |
          $version = "${{ github.event.inputs.version || '1.0-beta.1' }}"
          Write-Host "Building version: $version"
          .\publish.ps1
        shell: pwsh

      - name: Compile installer (ISCC)
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      - name: Verify Installation (DevMode)
        shell: pwsh
        run: powershell -File powershell\scripts\Verify-Install.ps1 -DevMode

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FactumIL-Beta-Installer
          path: Factum-IL-Setup.exe
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Factum IL ${{ github.ref_name }}
          body: |
            ## Factum IL Beta — ${{ github.ref_name }}

            ### התקנה
            1. הורד את `Factum-IL-Setup.exe`
            2. הרץ כמנהל מערכת
            3. עקוב אחר אשף ההתקנה

            ### דרישות מקדימות
            - Windows 10 (1803+) או Windows 11
            - .NET 8 Runtime (יוצע להורדה אוטומטית אם חסר)
            - WebView2 Runtime (כלול ב-Edge — בדרך כלל מותקן)
            - [Ollama](https://ollama.ai) עם מודל `BrainboxAI/law-il-E2B:Q4_K_M`

            ### הערות Beta
            - גרסה זו מיועדת לבדיקות פנימיות
            - כל הנתונים נשמרים מקומית בלבד
          draft: false
          prerelease: true
          files: Factum-IL-Setup.exe
