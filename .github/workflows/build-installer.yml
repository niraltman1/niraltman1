name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp (e.g. 1.0.0 or 1.0-beta.2)'
        required: false
        default: '1.0.0'
  push:
    tags:
      - 'v*'   # matches v1.0.0, v1.0-beta.1, v1.1.0-rc.1, etc.

permissions:
  contents: write   # required for softprops/action-gh-release to create releases

jobs:
  build:
    name: Build Windows EXE Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.4.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Install Hebrew language pack for Inno Setup
        shell: pwsh
        run: |
          $url  = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Hebrew.isl"
          $dest = "${env:ProgramFiles(x86)}\Inno Setup 6\Languages\Hebrew.isl"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          Write-Host "Hebrew.isl installed to $dest"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject version into build files
        shell: pwsh
        run: |
          $raw = if ("${{ github.event.inputs.version }}" -ne "") {
            "${{ github.event.inputs.version }}"
          } else {
            "${{ github.ref_name }}"
          }
          $ver = $raw.TrimStart('v')
          Write-Host "Stamping version: $ver"

          # installer.iss
          (Get-Content installer.iss -Encoding UTF8) `
            -replace '#define AppVersion\s+"[^"]*"', "#define AppVersion `"$ver`"" |
            Set-Content installer.iss -Encoding UTF8

          # FactumIL.Desktop.csproj
          (Get-Content FactumIL.Desktop\FactumIL.Desktop.csproj -Encoding UTF8) `
            -replace '<Version>[^<]*</Version>', "<Version>$ver</Version>" |
            Set-Content FactumIL.Desktop\FactumIL.Desktop.csproj -Encoding UTF8

          # package.json (root)
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $ver
          $pkg | ConvertTo-Json -Depth 20 | Set-Content package.json -Encoding UTF8

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build & stage (publish.ps1)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $raw = if ("${{ github.event.inputs.version }}" -ne "") {
            "${{ github.event.inputs.version }}"
          } else {
            "${{ github.ref_name }}"
          }
          $ver = $raw.TrimStart('v')
          Write-Host "Building version: $ver"
          .\publish.ps1 -SkipTests

      - name: Compile installer (ISCC)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify installer payload contains GGUF
        shell: pwsh
        run: |
          # Verify the GGUF was staged before ISCC compiled it
          $ggufPath = "FactumIL_Dist\models\gemma-4-E2B-it.BF16-mmproj.gguf"
          if (-not (Test-Path $ggufPath)) {
            Write-Error "GGUF model asset missing from staging directory — not bundled in installer."
            exit 1
          }
          $ggufMB = [math]::Round((Get-Item $ggufPath).Length / 1MB, 0)
          Write-Host "✓ GGUF staged: $ggufMB MB" -ForegroundColor Green

          # Verify installer size is plausible (GGUF alone is ~941 MB, installer cannot be smaller)
          $installerMB = [math]::Round((Get-Item "Factum-IL-Setup.exe").Length / 1MB, 0)
          Write-Host "  Installer size: $installerMB MB"
          if ($installerMB -lt 800) {
            Write-Error "Installer ($installerMB MB) too small — GGUF likely not bundled by ISCC."
            exit 1
          }
          Write-Host "✓ Installer size confirms GGUF payload ($installerMB MB)." -ForegroundColor Green

      - name: Verify Installation (DevMode)
        shell: pwsh
        run: powershell -File powershell\scripts\Verify-Install.ps1 -DevMode

      - name: Install & verify production layout
        shell: pwsh
        run: |
          # Install sqlite3 CLI so Verify-Install.ps1 can check migration count
          choco install sqlite --yes --no-progress

          # Silent install of the compiled EXE.
          # NOTE: model registration is intentionally NOT done by the installer — it is a
          # first-launch responsibility of the WPF BootstrapManager. So a fast, clean exit
          # here is expected; this smoke test only validates files, registry and DB health.
          Write-Host "Running silent install..."
          $proc = Start-Process -FilePath .\Factum-IL-Setup.exe `
            -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' `
            -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Error "Installer exited with code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "Silent install complete."

          # Match the DefaultDirName from installer.iss: {autopf}\FactumIL
          $installDir = "C:\Program Files\FactumIL"
          $apiEntry   = Join-Path $installDir "app\api\dist\start.js"
          $apiProc    = $null

          if (Test-Path $apiEntry) {
            $env:FACTUM_IL_SAFE_MODE = '1'
            $nodeExe = Join-Path $installDir "app\node\node.exe"
            $apiProc = Start-Process -FilePath $nodeExe -ArgumentList $apiEntry -PassThru
            Write-Host "API process started (PID $($apiProc.Id))."
          } else {
            Write-Warning "API bundle not found at $apiEntry — migration checks will be skipped."
          }

          # Wait up to 60 s for the health endpoint
          $healthy = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 2
            try {
              $r = Invoke-RestMethod 'http://localhost:3001/api/health' -TimeoutSec 3 -EA Stop
              if ($r.ok) { $healthy = $true; break }
            } catch { }
          }
          if ($healthy) { Write-Host "API healthy — DB migrations complete." }
          else          { Write-Warning "API not healthy — migration checks will be skipped." }

          # Production verification — validates files + registry
          powershell -File powershell\scripts\Verify-Install.ps1 `
            -InstallDir $installDir
          $verifyExit = $LASTEXITCODE

          if ($apiProc -and -not $apiProc.HasExited) {
            Stop-Process -Id $apiProc.Id -Force -ErrorAction SilentlyContinue
          }

          exit $verifyExit

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FactumIL-Installer-${{ github.ref_name || github.event.inputs.version || '1.0.0' }}
          path: Factum-IL-Setup.exe
          retention-days: 90

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: Deployment-Log.txt
          retention-days: 14

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Factum IL ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          body: |
            ## Factum IL ${{ github.ref_name }}

            ### התקנה
            1. הורד את `Factum-IL-Setup.exe`
            2. הרץ כמנהל מערכת
            3. עקוב אחר אשף ההתקנה — Ollama ומודל ה-AI יותקנו אוטומטית

            ### דרישות מקדימות
            - Windows 10 (17763+) או Windows 11 — 64 סיביות
            - .NET 8 Desktop Runtime (מוצג אוטומטית להורדה אם חסר)
            - WebView2 Runtime (נכלל ב-Edge — בדרך כלל מותקן)
            - **אין צורך בחיבור אינטרנט** — מודל ה-AI כלול במתקין

            ### מה כלול
            - מנוע Factum IL (WPF + Node.js API + React SPA)
            - Ollama (מנוע AI מקומי — מותקן אוטומטית)
            - מודל `BrainboxAI/law-il-E2B:Q4_K_M` (כלול ומוגדר אוטומטית)
            - 85 מיגרציות SQLite (כולל פלטפורמת הידע המשפטי המאוחד)
            - הרשם המשפטי + מגדיר מזהים

            ### אבטחה ופרטיות
            - כל הנתונים נשמרים מקומית בלבד — שום מידע לא עוזב את המחשב
            - AI מקומי לחלוטין — ללא קריאות ל-API חיצוני
          files: Factum-IL-Setup.exe
