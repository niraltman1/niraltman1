name: Stage Dependencies

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stage:
    name: Download and publish v-deps-1.0.0
    runs-on: ubuntu-latest

    steps:
      - name: Download Node.js 22.13.1 (Windows x64)
        run: |
          curl -fsSL -o node-v22.13.1-win-x64.zip \
            https://nodejs.org/dist/v22.13.1/node-v22.13.1-win-x64.zip
          echo "node zip: $(du -sh node-v22.13.1-win-x64.zip | cut -f1)"

      - name: Download Ollama installer (pinned v0.9.0)
        run: |
          curl -fsSL -o OllamaSetup.exe \
            https://github.com/ollama/ollama/releases/download/v0.9.0/OllamaSetup.exe
          echo "OllamaSetup: $(du -sh OllamaSetup.exe | cut -f1)"

      - name: Download WebView2 bootstrapper (self-hosted v-assets-latest)
        run: |
          curl -fsSL -o MicrosoftEdgeWebview2Setup.exe \
            "https://github.com/niraltman1/niraltman1/releases/download/v-assets-latest/MicrosoftEdgeWebView2RuntimeInstallerX64.exe"
          echo "WebView2: $(du -sh MicrosoftEdgeWebview2Setup.exe | cut -f1)"

      - name: Note on GGUF model asset
        run: |
          echo "GGUF model (gemma-4-E2B-it.BF16-mmproj.gguf) is self-hosted at v-model-latest."
          echo "The build pipeline (publish.ps1) downloads it directly from that release."
          echo "No re-upload to v-deps-1.0.0 is required."

      - name: Create release v-deps-1.0.0 (if absent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v-deps-1.0.0 \
            --repo niraltman1/niraltman1 \
            --title "Dependencies v1.0.0" \
            --notes "Pinned build deps: Node.js 22.13.1, Ollama 0.9.0, WebView2 bootstrapper. GGUF model is at v-model-latest. Not a product release — used by build-installer.yml." \
            || true

      - name: Upload assets (clobber existing)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v-deps-1.0.0 \
            --repo niraltman1/niraltman1 \
            --clobber \
            node-v22.13.1-win-x64.zip \
            OllamaSetup.exe \
            MicrosoftEdgeWebview2Setup.exe
